name: Build Plugin

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Build DLL
      run: msbuild GroundItemCleanerV6.csproj /p:Configuration=Release

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: GroundItemCleanerV6
        path: |
          **/bin/Release/*.dll
